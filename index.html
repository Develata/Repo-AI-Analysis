<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Github-Repos-AI-Analysis: structured AI-assisted GitHub repository analyses.">
    <title>Github-Repos-AI-Analysis</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <header class="site-nav">
      <a class="brand" href="#">
        <span>Develata's Space</span>
      </a>
      <button class="nav-search" id="nav-search" type="button" aria-label="Search reports">
        <span class="search-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <circle cx="9" cy="9" r="5.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <path d="m13.2 13.2 3.1 3.1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.6"/>
          </svg>
        </span>
        <span>Search</span>
        <kbd>Ctrl K</kbd>
      </button>
      <nav class="nav-links" aria-label="Primary">
        <a class="is-active" href="#">Home</a>
        <a href="https://develata.me/knowledge/">Knowledge <span aria-hidden="true">⌄</span></a>
        <a href="https://develata.me/news/">News</a>
        <a href="https://develata.me/books/">Books</a>
        <a href="https://develata.me/games/">Games</a>
        <a href="https://develata.me/about/me">About <span aria-hidden="true">⌄</span></a>
      </nav>
      <div class="nav-divider" aria-hidden="true"></div>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">◐</button>
      <a class="github-link" href="https://github.com/Develata" aria-label="GitHub">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.05c-3.34.73-4.04-1.41-4.04-1.41-.55-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49.99.11-.78.42-1.3.76-1.6-2.66-.3-5.46-1.33-5.46-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.3-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.62-5.48 5.92.43.37.81 1.1.81 2.22v3.3c0 .32.22.7.83.58A12 12 0 0 0 12 .5Z"/>
        </svg>
      </a>
      <button class="roll-button" id="nav-roll" type="button" aria-label="Open a random analysis">
        <img src="assets/favicon.svg" alt="">
        <span>Roll</span>
      </button>
    </header>

    <main>
      <section class="hero" id="top">
        <div class="hero-copy">
          <h1>Curated repo intelligence</h1>
          <p>面向开源 GitHub 仓库的结构化 AI 辅助分析：能力、质量、安全、成熟度、生态与推荐度。</p>
        </div>
        <div class="hero-panel" aria-label="Repository analysis summary">
          <div class="metric">
            <span class="metric-value" id="metric-count">0</span>
            <span class="metric-label">Analyses</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="metric-score">-</span>
            <span class="metric-label">Avg score</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="metric-stars">-</span>
            <span class="metric-label">Stars tracked</span>
          </div>
        </div>
      </section>

      <section class="toolbar" id="library">
        <label class="search-box">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="repo, tag, language, category">
        </label>
        <select id="category-filter" aria-label="Category filter"></select>
        <select id="language-filter" aria-label="Language filter"></select>
        <label class="check-filter">
          <input id="sharing-filter" type="checkbox">
          <span>Sharing candidates</span>
        </label>
      </section>

      <section class="content-shell">
        <aside class="side-panel" id="compare">
          <h2>Dimensions</h2>
          <div id="dimension-list" class="dimension-list"></div>
          <h2>Categories</h2>
          <div id="category-list" class="category-list"></div>
        </aside>
        <section class="library-panel">
          <div class="section-head">
            <h2>Repository Analyses</h2>
            <span id="result-count">0 items</span>
          </div>
          <div id="card-grid" class="card-grid"></div>
        </section>
      </section>

      <section id="report-view" class="report-view" hidden>
        <button id="back-button" class="text-button" type="button">Back to library</button>
        <article class="report-article">
          <div id="report-meta" class="report-meta"></div>
          <div id="report-body" class="report-body"></div>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script type="module" src="assets/app.js"></script>
  </body>
</html>
