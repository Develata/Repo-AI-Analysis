<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Structured AI-assisted GitHub repository analyses.">
    <title>GH Repos AI Analysis</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <header class="site-nav">
      <a class="brand" href="#">
        <span class="brand-mark">GH</span>
        <span>Repos AI Analysis</span>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a href="#library">Library</a>
        <a href="#compare">Compare</a>
        <a href="https://develata.me">develata.me</a>
      </nav>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">◐</button>
    </header>

    <main>
      <section class="hero" id="top">
        <div class="hero-copy">
          <h1>Curated repo intelligence</h1>
          <p>面向开源 GitHub 仓库的结构化 AI 辅助分析：能力、质量、安全、成熟度、生态与推荐度。</p>
        </div>
        <div class="hero-panel" aria-label="Repository analysis summary">
          <div class="metric">
            <span class="metric-value" id="metric-count">0</span>
            <span class="metric-label">Analyses</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="metric-score">-</span>
            <span class="metric-label">Avg score</span>
          </div>
          <div class="metric">
            <span class="metric-value" id="metric-stars">-</span>
            <span class="metric-label">Stars tracked</span>
          </div>
        </div>
      </section>

      <section class="toolbar" id="library">
        <label class="search-box">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="repo, tag, language, category">
        </label>
        <select id="category-filter" aria-label="Category filter"></select>
        <select id="language-filter" aria-label="Language filter"></select>
        <label class="check-filter">
          <input id="sharing-filter" type="checkbox">
          <span>Sharing candidates</span>
        </label>
      </section>

      <section class="content-shell">
        <aside class="side-panel" id="compare">
          <h2>Dimensions</h2>
          <div id="dimension-list" class="dimension-list"></div>
          <h2>Categories</h2>
          <div id="category-list" class="category-list"></div>
        </aside>
        <section class="library-panel">
          <div class="section-head">
            <h2>Repository Analyses</h2>
            <span id="result-count">0 items</span>
          </div>
          <div id="card-grid" class="card-grid"></div>
        </section>
      </section>

      <section id="report-view" class="report-view" hidden>
        <button id="back-button" class="text-button" type="button">Back to library</button>
        <article class="report-article">
          <div id="report-meta" class="report-meta"></div>
          <div id="report-body" class="report-body"></div>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script type="module" src="assets/app.js"></script>
  </body>
</html>
